<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>割り勘ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA設定 -->
  <link rel="manifest" href="./manifest.json?v=11">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="割り勘ツール">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <link rel="stylesheet" href="./style.css?v=11">
</head>
<body>
  <main>
    <div class="app-header">
      <div class="app-icon">¥</div>
      <h1>割り勘ツール</h1>
      <p>立替・割り勘をサクッと精算</p>
    </div>

    <section class="card">
      <h2>メンバー登録</h2>
      <input id="memberName" placeholder="名前を入力">
      <button onclick="addMember()">メンバー追加</button>
      <div id="memberList"></div>
    </section>

    <section class="card">
      <h2 id="paymentFormTitle">支払い登録</h2>

      <label>タイトル</label>
      <input id="paymentTitle" placeholder="例：高速代(行き)">

      <label>払った人</label>
      <select id="payer"></select>

      <label>支払った合計金額</label>
      <input id="amount" type="number" placeholder="例：30000">

      <label>対象メンバー</label>
      <div id="targetMembers"></div>

      <button id="paymentSubmitButton" onclick="savePayment()">支払い登録</button>
      <button id="paymentCancelButton" class="sub hidden" onclick="cancelPaymentEdit()">編集キャンセル</button>
      <button class="sub" onclick="clearInput()">入力クリア</button>
    </section>

    <section class="card result-card">
      <h2>精算結果</h2>
      <p id="resultModeText">最小精算方式</p>
      <button class="sub" onclick="toggleResultMode()">履歴反映方式に切替</button>
      <button class="sub" onclick="clearPaidChecks()">支払い済みチェックをクリア</button>
      <ul id="resultList"></ul>
    </section>

    <section class="card">
      <h2>支払い履歴</h2>
      <button class="sub" onclick="toggleHistory()">履歴を表示</button>
      <div id="historyArea" class="history-area hidden">
        <ul id="historyList"></ul>
      </div>
    </section>

    <section class="card">
      <h2>共有・読み込み</h2>

      <button onclick="generateShareText()">共有テキスト作成</button>
      <button class="sub" onclick="copyShareText()">テキストをコピー</button>
      <button class="sub" onclick="clearShareText()">共有テキストをクリア</button>

      <label>共有テキスト</label>
      <textarea id="shareText" placeholder="ここに共有用テキストが表示されます。LINEにそのまま貼れます。"></textarea>

      <button onclick="importShareText()">このテキストを読み込む</button>
    </section>

    <section class="card">
      <h2>データ管理</h2>
      <button class="sub" onclick="clearPayments()">支払い履歴クリア</button>
      <button class="danger" onclick="clearAll()">全削除</button>
    </section>
  </main>

  <div id="toast" class="toast">保存しました</div>

  <script src="./script.js?v=11"></script>

  <!-- Service Worker登録 -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=11")
          .catch(error => {
            console.log("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
